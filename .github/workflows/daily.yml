name: Daily Event Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC (8 AM Singapore time)
  workflow_dispatch: # This adds a button so you can run it manually to test!

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This gives the script permission to "Write" the .ics file back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and Push .ics file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tsl_events.ics
          # Only commit if the file actually changed to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update events: $(date)" && git push)
